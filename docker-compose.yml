version: '3.8'

services:
  backend:
    build: ./backend
    container_name: monitoring-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-monitoring_user}:${POSTGRES_PASSWORD:-monitoring_pass}@postgres:5432/${POSTGRES_DB:-monitoring_db}
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      # Melakukan mount folder targets ke backend agar bisa menulis file websites.yml
      - ./monitoring/prometheus/targets:/shared_targets
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: monitoring-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: monitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitoring_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitoring_pass}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitoring_user} -d ${POSTGRES_DB:-monitoring_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: monitoring-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Melakukan mount folder targets ke prometheus agar file_sd_configs bisa membaca websites.yml
      - ./monitoring/prometheus/targets:/etc/prometheus/targets
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'

  blackbox:
    image: prom/blackbox-exporter:v0.24.0
    container_name: monitoring-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'

  grafana:
    image: grafana/grafana:10.1.0
    container_name: monitoring-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
