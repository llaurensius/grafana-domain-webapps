global:
  scrape_interval: 30s # Interval umum scraping
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]  # Menggunakan modul http_2xx dari blackbox.yml
    file_sd_configs:
      - files:
        - '/etc/prometheus/targets/*.yml' # Membaca target dari file yaml secara dinamis
        refresh_interval: 10s # Memeriksa file setiap 10 detik untuk mendeteksi perubahan
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115  # Host dari blackbox exporter (menggunakan nama service Compose)

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
